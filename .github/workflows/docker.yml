name: Docker Build & Push

on:
  push:
    branches-ignore:
      - main
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  branch-docker:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - id: branch
        shell: bash
        run: |
          branch="${GITHUB_REF_NAME,,}"
          branch="${branch//\//-}"
          branch="${branch//_/-}"
          branch="$(echo "$branch" | tr -cd 'a-z0-9.-')"
          branch="$(echo "$branch" | sed 's/^[.-]*//; s/[.-]*$//')"
          if [[ -z "$branch" ]]; then
            echo "sanitized branch tag is empty" >&2
            exit 1
          fi
          echo "tag=$branch" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            VERSION=${{ github.ref_name }}-${{ steps.branch.outputs.short_sha }}
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}:${{ steps.branch.outputs.tag }}
            ghcr.io/${{ steps.repo.outputs.name }}:${{ steps.branch.outputs.tag }}-${{ steps.branch.outputs.short_sha }}

  release-docker:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ github.event.release.tag_name }}
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}:latest
            ghcr.io/${{ steps.repo.outputs.name }}:${{ github.event.release.tag_name }}
